name: "CI and CD for Frontend"

on:
  workflow_call:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "Build, Test and Publish"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read
      statuses: write
      checks: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        name: "Check out repository"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: "Setup node"
        with:
          node-version: "24"

      - if: github.event_name == 'pull_request'
        name: "Check release-facing content label"
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          updated_label="docs updated"
          not_required_label="docs not needed"
          labels=$(gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/labels" --jq '.[].name')

          if grep -Fxq "${updated_label}" <<< "${labels}" || grep -Fxq "${not_required_label}" <<< "${labels}"; then
            echo "Release-facing content label found."
            exit 0
          fi

          echo "::error::Add either '${updated_label}' or '${not_required_label}' to this PR."
          exit 1

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: changes
        with:
          filters: |
            src:
              - "src/frontend/**"

      - if: steps.changes.outputs.src == 'true'
        name: "Install dependencies"
        run: npm ci
        working-directory: "src/frontend"

      - if: steps.changes.outputs.src == 'true'
        name: "Run pre-commit hooks"
        run: |
          sudo apt install pipx -y
          sudo apt install shellcheck -y

          pipx install pre-commit

          pre-commit run --all-files || true

      - if: steps.changes.outputs.src == 'true'
        name: "Build (bundle analysis)"
        run: npm run build
        working-directory: "src/frontend"
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - if: steps.changes.outputs.src == 'true'
        name: "Run tests"
        run: npm test
        working-directory: "src/frontend"

      - if: success() || failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "Upload jest test results"
          path: src/frontend/reports/jest-junit.xml

      - name: "Markdown lint"
        run: |
          npx markdownlint-cli2 "**/*.md" --config ".github/.markdownlint.json" "#src/frontend/node_modules"

      - name: "Spell check"
        run: |
          wget https://raw.githubusercontent.com/tbroadley/spellchecker-cli/ddb8f07599b5b15147168d3bcd8bbede0df8d2c7/dictionaries/base.txt
          echo "" >> base.txt
          echo "AdjustIcon" >> base.txt
          echo "allowlist" >> base.txt
          echo "anonymize" >> base.txt
          echo "Async" >> base.txt
          echo "azure-devops-extension-" >> base.txt
          echo "Backend" >> base.txt
          echo "Bain" >> base.txt
          echo "camelCase" >> base.txt
          echo "Changelog" >> base.txt
          echo "changelog" >> base.txt
          echo "CI_Backend" >> base.txt
          echo "CodeCov" >> base.txt
          echo "CSV" >> base.txt
          echo "customizable" >> base.txt
          echo "Dependabot" >> base.txt
          echo "devDependency" >> base.txt
          echo "Dev" >> base.txt
          echo "DevOps" >> base.txt
          echo "Edmondson" >> base.txt
          echo "emailable" >> base.txt
          echo "enum" >> base.txt
          echo "ERD" >> base.txt
          echo "ES2020" >> base.txt
          echo "ESNext" >> base.txt
          echo "favorability" >> base.txt
          echo "favorability-band" >> base.txt
          echo "Forsgren" >> base.txt
          echo "Frontend" >> base.txt
          echo "GitHub" >> base.txt
          echo "gitleaks" >> base.txt
          echo "hostname" >> base.txt
          echo "JSX" >> base.txt
          echo "Kanban" >> base.txt
          echo "lockfile" >> base.txt
          echo "memoizing" >> base.txt
          echo "Moq" >> base.txt
          echo "OKR" >> base.txt
          echo "OKRs" >> base.txt
          echo "on-prem" >> base.txt
          echo "OpenSSF" >> base.txt
          echo "outloud" >> base.txt
          echo "parens" >> base.txt
          echo "PascalCase" >> base.txt
          echo "pre-populated" >> base.txt
          echo "Pre-commit" >> base.txt
          echo "PRs" >> base.txt
          echo "README" >> base.txt
          echo "ReactTable" >> base.txt
          echo "reconnection" >> base.txt
          echo "roadmap" >> base.txt
          echo "scrollbar" >> base.txt
          echo "SDK" >> base.txt
          echo "SignalR" >> base.txt
          echo "timebox" >> base.txt
          echo "tooltip" >> base.txt
          echo "unaggregated" >> base.txt
          echo "uncast" >> base.txt
          echo "uncheck" >> base.txt
          echo "useCallback" >> base.txt
          echo "useState" >> base.txt
          echo "WebSocket" >> base.txt
          echo "websocket" >> base.txt
          echo "WIP" >> base.txt
          echo "xUnit" >> base.txt
          echo "ZTNA" >> base.txt
          npx -y spellchecker-cli --config ./.github/.spellcheckerrc.yaml

      - if: steps.changes.outputs.src == 'true'
        name: "OpenSSF Score Card"
        run: |
          #!/bin/bash
          set -e
          docker run -e GITHUB_AUTH_TOKEN=${{ github.token }} gcr.io/openssf/scorecard:stable@sha256:54c7ea4ddec6e3941887cb7933898c352f59e7f59e17a7a730f97ed348a8dfce --repo=https://github.com/microsoft/vsts-extension-retrospectives || true

      - if: steps.changes.outputs.src == 'true'
        name: "Upload coverage to Codecov"
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          name: frontend
          flags: frontend
          codecov_yml_path: .github/codecov.yml
          files: src/frontend/coverage/coverage-final.json,src/frontend/coverage/cobertura-coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - if: steps.changes.outputs.src == 'true'
        name: "Prepare package"
        working-directory: "src/frontend"
        run: |
          ext_file="vss-extension-dev.json"

          cp "${ext_file}.template" "${ext_file}"

          cat <<< $(jq 'del(.baseUri)' $ext_file) > $ext_file

          cat <<< $(jq ".id = \"team-retrospectives-dev\"" $ext_file) > $ext_file
          cat <<< $(jq ".publisher = \"enginpolat\"" $ext_file) > $ext_file
          cat <<< $(jq ".public = false" $ext_file) > $ext_file

          ext_info=$(npx tfx extension show --no-prompt --json --publisher "enginpolat" --extensionId "team-retrospectives-dev" --token "${{ secrets.AZURE_DEVOPS_TOKEN }}")

          if [[ "$ext_info" != "null" ]]; then
            version=$(jq -r '.versions[0].version' <<< "$ext_info")
            cat <<< $(jq ".version = \"$version\"" $ext_file) > $ext_file
          fi

          cat <<< $(jq ".contributions[0].properties.name = \"Retrospectives (Dev)\"" $ext_file) > $ext_file

          cp ../../LICENSE ./assets/LICENSE.md

      - if: steps.changes.outputs.src == 'true'
        name: "Publish extension to dev environment"
        working-directory: "src/frontend"
        env:
          REACT_APP_COLLABORATION_STATE_SERVICE_URL: ${{ secrets.BACKEND_WEBAPP }}
          REACT_APP_APP_INSIGHTS_INSTRUMENTATION_KEY: ${{ secrets.AI_INSTRUMENTATION_KEY }}
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          AZURE_DEVOPS_TOKEN: ${{ secrets.AZURE_DEVOPS_TOKEN }}
        run: |
          set -euo pipefail

          # Build/package once, then retry only the publish call for transient marketplace errors (e.g. HTTP 503).
          npm run pack:d

          max_attempts=4
          attempt=1

          until [ "$attempt" -gt "$max_attempts" ]; do
            echo "Publish attempt ${attempt}/${max_attempts}"

            if npx tfx extension publish --manifests vss-extension-dev.json --vsix ./dist/*.vsix --token "${AZURE_DEVOPS_TOKEN}"; then
              echo "Extension publish succeeded on attempt ${attempt}."
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "Extension publish failed after ${max_attempts} attempts."
              exit 1
            fi

            sleep_seconds=$((15 * attempt))
            echo "Publish failed. Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"

            attempt=$((attempt + 1))
          done
